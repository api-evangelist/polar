    trainingSessionSamples:
      type: object
      description: >-
        Sample model contains two properties, `fields` and `values`.
        `Fields` contains list of sample types which are available in `values`.
        `Values` contains list of sample value lists. Each sample value list has
        duration as first item which tells the record time (from the beginning
        of the training) of the samples. Next values in array contains the sample
        value itself.
      properties:
        fields:
          type: array
          description: List of sample types which are present in `values` property.
          items:
            type: string
            enum:
              - time: Timestamp of sample in ISO 8601 string format, starting from 0.
              - distance: Total distance moved in meters, double.
              - hr: Heart rate, double.
              - speed: Current speed, double.
              - cadence: Current cadence, double.
              - lat: Location latitude coordinate, double.
              - lon: Location longitude coordinate, double.
              - altitude: Location altitude, double.
              - forward_acceleration: Forward acceleration, double.
              - power: Current power, integer.

          example: [ "time", "distance", "hr", "speed", "cadence", "lat", "lon", "altitude", "forward_acceleration", "power" ]
        values:
          type: array
          description: List of sample value lists.
          items:
            type: array
            items: { }
          example: [ [ "PT0S",0.0,94.0,0.0,0,55.67336654663086,12.49395084381104,null,0.0 ],[ "PT0.1S",0.0,null,0.0,0,null,null,null,null,0.04 ],[ "PT0.2S",0.0,null,0.0,0,null,null,null,null,-0.02, 125 ] ]
    teamSportProfile:
      type: object
