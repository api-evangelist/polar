            format: date-time
            example: '2025-05-16T11:52:54Z'
        modified:
          type: string
          description: Time when the sport profile was last modified
          format: date-time
          example: '2025-05-16T11:52:54Z'
        sprint_threshold_type:
          type: string
          description: Sprint threshold type
          example: ACCELERATION
          enum:
          - ACCELERATION
          - SPEED
        sprint_threshold:
          type: number
          description: Sprint threshold
          example: 2.8
        gps_state:
          type: string
          description: GPS state
          example: ON_NORMAL
          enum:
            - OFF
            - ON_NORMAL
            - ON_LONG
            - GPS_ON_10_HZ
            - GPS_ON_MEDIUM
        muscle_load_setting:
          type: string
          description: Is muscle load enabled
          example: ON
          enum:
            - OFF
            - ON
        heart_rate_zone_type:
          type: string
          description: Heart rate zone type
          example: THRESHOLD
          enum:
            - DEFAULT
            - FREE
            - THRESHOLD
        speed_zone_type:
          type: string
          description: Speed zone type
          example: FREE
          enum:
            - DEFAULT
            - FREE
        power_zone_type:
          type: string
          description: Power zone type
          example: DEFAULT
          enum:
            - DEFAULT
            - FREE
        zones:
          $ref: '#/components/schemas/sportProfileZones'
        acceleration_zones:
          $ref: '#/components/schemas/sportProfileAccelerationZones'
    sportProfileZones:
      description: Sport zones created for the sport profile
      properties:
        heart_rate:
          type: array
          description: Heart rate zones in beats per minute if sport profile has them.
          example: [
            { "lower_limit": 100.0, "higher_limit": 120.0 },
            { "lower_limit": 120.0, "higher_limit": 140.0 },
            { "lower_limit": 140.0, "higher_limit": 160.0 },
            { "lower_limit": 160.0, "higher_limit": 180.0 },
            { "lower_limit": 180.0, "higher_limit": 200.0 }
          ]
          items:
            $ref: '#/components/schemas/sportProfileZone'
        speed:
          type: array
          description: Speed zones in kilometers per hour if sport profile has them.
          example: [
            { "lower_limit": 10.0, "higher_limit": 12.0 },
            { "lower_limit": 12.0, "higher_limit": 15.0 },
            { "lower_limit": 15.0, "higher_limit": 17.1 },
            { "lower_limit": 17.1, "higher_limit": 20.0 },
            { "lower_limit": 20.0, "higher_limit": 399.0 }
          ]
          items:
            $ref: '#/components/schemas/sportProfileZone'
        power:
          type: array
          description: Power zones in watts if sport profile has them.
          example: [
            { "lower_limit": 70.0, "higher_limit": 85.0 },
            { "lower_limit": 85.0, "higher_limit": 100.0 },
            { "lower_limit": 100.0, "higher_limit": 130.0 },
            { "lower_limit": 130.0, "higher_limit": 180.0 },
            { "lower_limit": 180.0, "higher_limit": 400.0 }
          ]
          items:
            $ref: '#/components/schemas/sportProfileZone'
    sportProfileZone:
      description: Single sport profile zone
      properties:
        lower_limit:
          type: number
          description: Lower limit of the zone (inclusive)
        higher_limit:
          type: number
          description: Higher limit of the zone (exclusive)
    sportProfileAccelerationZones:
      description: Acceleration zones for the sport profile
      properties:
        free_acceleration_zones:
          type: boolean
          description: Free acceleration zones in use
          example: true
        acceleration_zones:
          type: array
          description: List of four acceleration zone thresholds from lowest to highest.
          example: [ 0.5, 1.0, 2.0, 3.0 ]
          items:
            type: number
        deceleration_zones:
          type: array
          description: List of four deceleration zone thresholds from lowest to highest.
          example: [ -0.5, -1.0, -2.0, -3.0 ]
          items:
            type: number